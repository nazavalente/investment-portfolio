services:
  - type: web
    name: investment-portfolio-api
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run prisma:deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
